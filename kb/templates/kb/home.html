{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnemos - Base de Connaissance IA</title>
    <link rel="icon" type="image/png" href="{% static 'kb/images/mnemoslogo1.png' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo img {
            max-width: 200px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a {
            display: inline-block;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            border-color: #999;
        }

        .io-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-sm {
            padding: 7px 18px;
            font-size: 0.85em;
        }

        .import-label {
            display: inline-block;
            padding: 7px 18px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .import-label:hover {
            background: #e0e0e0;
            border-color: #999;
        }

        #import-file { display: none; }

        .topbar {
            position: fixed;
            top: 0;
            right: 0;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9em;
            color: rgba(255,255,255,0.9);
        }

        .topbar span {
            font-weight: 600;
        }

        .btn-logout {
            padding: 6px 14px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s ease;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.35);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <span>{{ request.user.username }}</span>
        <form method="post" action="{% url 'kb:logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn-logout">Déconnexion</button>
        </form>
    </div>

    <div class="container">
        <div class="logo">
            <img src="{% static 'kb/images/mnemoslogo1.png' %}" alt="Mnemos Logo">
        </div>

        <h1>Bienvenue</h1>
        <p class="subtitle">
            Base de connaissance IA locale. Enregistrez vos procédures et retrouvez-les en conversant avec l'IA.
        </p>

        <div class="links">
            <a href="{% url 'kb:chat' %}" class="btn-primary">Ouvrir le chat</a>
            <a href="/admin/" class="btn-secondary">Administration</a>
        </div>

        <div class="io-section">
            <a href="{% url 'kb:export' %}" class="btn-secondary btn-sm">Exporter la base</a>
            <form method="post" action="{% url 'kb:import' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <label class="import-label" for="import-file">Importer un export</label>
                <input id="import-file" type="file" name="file" accept=".json"
                       onchange="this.form.submit()">
            </form>
        </div>
    </div>
</body>
</html>
