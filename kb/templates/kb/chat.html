{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnemos - Chat</title>
    <link rel="icon" type="image/png" href="{% static 'kb/images/mnemoslogo1.png' %}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        // Inject Django CSRF token into every HTMX request
        document.addEventListener('htmx:configRequest', function(evt) {
            const match = document.cookie.split(';')
                .map(c => c.trim()).find(c => c.startsWith('csrftoken='));
            if (match) evt.detail.headers['X-CSRFToken'] = match.split('=')[1];
        });
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            flex-shrink: 0;
        }

        .topbar .brand {
            font-weight: 700;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar .brand img { height: 28px; }

        .topbar .user {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9em;
        }

        .btn-logout {
            padding: 5px 14px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-logout:hover { background: rgba(255,255,255,0.35); }

        .mode-toggle {
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 3px;
        }

        .mode-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            color: rgba(255,255,255,0.7);
            background: transparent;
            transition: all 0.15s;
        }

        .mode-btn.active {
            background: rgba(255,255,255,0.25);
            color: white;
        }

        .mode-btn:not(.active):hover { color: white; }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .input-area {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 16px 20px;
            flex-shrink: 0;
        }

        .input-form {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        .input-form input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-form input:focus { border-color: #667eea; }

        .input-form button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .input-form button:hover { opacity: 0.9; }

        .htmx-request .input-form button { opacity: 0.6; cursor: wait; }

        .message.thinking {
            align-self: flex-start;
            background: white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
        }

        .message.thinking span {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .message.thinking span:nth-child(2) { animation-delay: 0.2s; }
        .message.thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .thinking-label {
            color: #aaa;
            font-size: 0.8em;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">
            <img src="{% static 'kb/images/mnemoslogo1.png' %}" alt="Mnemos">
            Mnemos
        </div>
        <div class="user">
            <div class="mode-toggle" id="mode-toggle">
                {% for key, mode in kb_modes.items %}
                <button class="mode-btn {% if key == current_mode %}active{% endif %}"
                        title="{{ mode.description }}"
                        hx-post="{% url 'kb:set_mode' %}"
                        hx-vals='{"mode": "{{ key }}"}'
                        hx-swap="none"
                        onclick="setActiveMode(this)">
                    {{ mode.label }}
                </button>
                {% endfor %}
            </div>
            <span>{{ request.user.username }}</span>
            <form method="post" action="{% url 'kb:logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn-logout">Déconnexion</button>
            </form>
        </div>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <form class="input-form"
              hx-post="{% url 'kb:chat' %}"
              hx-target="#messages"
              hx-swap="beforeend"
              hx-on::after-request="this.reset()">
            {% csrf_token %}
            <input type="text" name="message" placeholder="Posez une question ou partagez une procédure…" autocomplete="off" autofocus>
            <button type="submit">Envoyer</button>
        </form>
    </div>
    <script>
        const messages = document.getElementById('messages');

        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            const form = evt.detail.elt;
            if (!form.classList.contains('input-form')) return;
            const msg = form.querySelector('input[name="message"]').value.trim();
            if (!msg) return;
            const bubble = document.createElement('div');
            bubble.className = 'message user';
            bubble.textContent = msg;
            messages.appendChild(bubble);
            messages.scrollTop = messages.scrollHeight;
        });

        function setActiveMode(btn) {
            document.querySelectorAll('#mode-toggle .mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        document.body.addEventListener('htmx:responseError', function(evt) {
            if (evt.detail.xhr.status === 401) {
                const errDiv = document.createElement('div');
                errDiv.className = 'message assistant';
                errDiv.textContent = 'Session expirée. Rechargez la page pour vous reconnecter.';
                messages.appendChild(errDiv);
                messages.scrollTop = messages.scrollHeight;
            }
        });
    </script>
</body>
</html>
